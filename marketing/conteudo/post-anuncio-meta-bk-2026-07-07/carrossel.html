<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>BK Solutions — Anúncio Meta Ads</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
    background: #0E1116;
    padding: 90px 80px;
  }

  .conteudo {
    position: absolute;
    top: 240px;
    left: 80px;
    right: 80px;
  }

  .eyebrow {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #E8B34C;
  }

  .regua {
    width: 70px;
    height: 4px;
    background: #E8B34C;
    margin: 28px 0 36px;
  }

  .headline {
    font-size: 112px;
    font-weight: 900;
    line-height: 0.98;
    letter-spacing: -0.04em;
    color: #FAFAF7;
    max-width: 920px;
  }

  .corpo {
    margin-top: 48px;
    font-size: 30px;
    font-weight: 500;
    line-height: 1.55;
    color: #C7C9CE;
    max-width: 780px;
  }

  .rodape {
    position: absolute;
    left: 80px;
    right: 80px;
    bottom: 90px;
    border-top: 1px solid rgba(255,255,255,0.12);
    padding-top: 36px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    background: #E8B34C;
    color: #0E1116;
    font-weight: 800;
    font-size: 24px;
    letter-spacing: -0.01em;
    padding: 20px 36px;
    border-radius: 100px;
  }

  .marca {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: #FAFAF7;
  }
</style>
</head>
<body>

<div class="slide">
  <div class="conteudo">
    <div class="eyebrow">BK SOLUTIONS · IA + TRÁFEGO PAGO</div>
    <div class="regua"></div>
    <div class="headline">Sua clínica<br/>lota a agenda<br/>sozinha</div>
    <div class="corpo">Implementamos IA nos processos da sua clínica e ligamos isso a tráfego pago de verdade. Sem prometer milagre, só sistema rodando.</div>
  </div>
  <div class="rodape">
    <div class="marca">BK Solutions</div>
    <div class="cta">Fala com a gente no WhatsApp →</div>
  </div>
</div>

</body>
</html>
